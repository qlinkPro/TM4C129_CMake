# TM4C1294NCPDT + on-board TI ICDI (OpenOCD 0.11 compatible)
#
# Use this file as the only -f argument in OpenOCD server command:
#   /usr/bin/openocd -s /usr/share/openocd/scripts -f board/openocd_tm4c1294.cfg

source [find interface/ti-icdi.cfg]
transport select hla_jtag

set WORKAREASIZE 0x8000
set CHIPNAME tm4c1294ncpdt
source [find target/stellaris.cfg]

# ICDI SRST wiring is often unreliable with this target.
# Keep reset software-driven from GDB side.
reset_config none
adapter speed 1000
